name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: |
          emacs --batch -Q -L . \
            -f batch-byte-compile \
            ghostel.el ghostel-debug.el

      - name: Checkdoc
        run: |
          output=$(emacs --batch -Q -L . \
            --eval "(require 'checkdoc)" \
            --eval "(checkdoc-file \"ghostel.el\")" 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Warning"; then
            exit 1
          fi

      - name: Package-lint
        run: |
          emacs --batch -Q \
            --eval "(progn
                      (require 'package)
                      (push '(\"melpa\" . \"https://melpa.org/packages/\") package-archives)
                      (package-initialize)
                      (package-refresh-contents)
                      (package-install 'package-lint))" \
            -L . \
            -f package-lint-batch-and-exit \
            ghostel.el

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run pure Elisp tests
        run: |
          emacs --batch -Q -L . \
            -l test/ghostel-test.el \
            -f ghostel-test-run-elisp

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
          - os: macos-latest
            platform: aarch64-macos
            suffix: .dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Emacs headers
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y emacs-nox
            echo "EMACS_INCLUDE_DIR=/usr/include" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install emacs
            EMACS_PREFIX="$(brew --prefix emacs)"
            echo "EMACS_INCLUDE_DIR=${EMACS_PREFIX}/include" >> "$GITHUB_ENV"
          fi

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build native module
        run: ./build.sh

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: ghostel-module${{ matrix.suffix }}
